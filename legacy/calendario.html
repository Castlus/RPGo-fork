<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário da Mesa</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./js/components/calendario/calendario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Aplica o tema salvo antes do primeiro render (evita flash)
        (function () {
            const temaId = localStorage.getItem('temaId');
            const PRESETS = {
                dark:     { '--bg-page':'#121212','--bg-card':'#1e1e1e','--bg-surface':'#252525','--text-main':'#e0e0e0','--text-sec':'#a0a0a0','--primary':'#ec7e22','--border':'#444444','--bg-button':'#333333','--text-button':'#e0e0e0', dark: true },
                ocean:    { '--bg-page':'#e0f2fe','--bg-card':'#ffffff','--bg-surface':'#f0f9ff','--text-main':'#03045e','--text-sec':'#4a90a4','--primary':'#0077b6','--border':'#bae6fd','--bg-button':'#e0f2fe','--text-button':'#03045e', dark: false },
                noite:    { '--bg-page':'#0d0d1a','--bg-card':'#16162a','--bg-surface':'#1e1e35','--text-main':'#e8e8ff','--text-sec':'#8888bb','--primary':'#7c3aed','--border':'#333355','--bg-button':'#1e1e35','--text-button':'#e8e8ff', dark: true },
                pirata:   { '--bg-page':'#1a1209','--bg-card':'#231810','--bg-surface':'#2e2015','--text-main':'#e8d5a3','--text-sec':'#a08060','--primary':'#c8973a','--border':'#4a3020','--bg-button':'#2e2015','--text-button':'#e8d5a3', dark: true },
                floresta: { '--bg-page':'#f0f7f4','--bg-card':'#ffffff','--bg-surface':'#e8f5e9','--text-main':'#1b4332','--text-sec':'#52796f','--primary':'#2d6a4f','--border':'#b7e4c7','--bg-button':'#e8f5e9','--text-button':'#1b4332', dark: false },
            };
            function aplicar(vars, isDark) {
                const root = document.documentElement;
                for (const [k, v] of Object.entries(vars)) {
                    if (k !== 'dark') root.style.setProperty(k, v);
                }
                if (isDark) document.body.classList.add('dark-mode');
            }
            if (temaId && temaId.startsWith('custom-')) {
                try {
                    const lista = JSON.parse(localStorage.getItem('temasCustomList') || '[]');
                    const tema  = lista.find(t => t.id === temaId);
                    if (tema) { aplicar(tema.vars, tema.dark); return; }
                } catch (_) {}
            }
            if (temaId && PRESETS[temaId]) {
                const p = PRESETS[temaId];
                aplicar(p, p.dark);
                return;
            }
            if (localStorage.getItem('theme') === 'dark') {
                aplicar(PRESETS.dark, true);
            }
        })();
    </script>

    <style>
        html, body {
            display: block;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .cal-page-wrapper {
            max-width: 1100px;
            margin: 32px auto;
            padding: 22px 24px 26px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 24px -16px rgba(0, 0, 0, 0.25);
        }

        .cal-page-topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .cal-page-voltar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-sec);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
            cursor: pointer;
        }
        .cal-page-voltar:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .cal-page-titulo {
            display: flex;
            flex-direction: column;
            line-height: 1.15;
            flex: 1;
            min-width: 0;
        }

        .cal-page-kicker {
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--text-sec);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .cal-page-titulo h1 {
            margin: 2px 0 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cal-page-mesa-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 7px;
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-sec);
        }

        .cal-page-mesa-chip .cal-page-role {
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        .cal-page-loading {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-sec);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="cal-page-wrapper">
        <div class="cal-page-topbar">
            <a id="btnVoltarMesa" class="cal-page-voltar" title="Voltar pra mesa">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="cal-page-titulo">
                <span class="cal-page-kicker">CALENDÁRIO DA MESA</span>
                <h1 id="mesaNomeTopo">Carregando...</h1>
            </div>
            <div class="cal-page-mesa-chip">
                <i class="fas fa-chess-king"></i>
                <span class="cal-page-role">NARRADOR</span>
            </div>
        </div>

        <div id="calendarioContainer">
            <div class="cal-page-loading">
                <i class="fas fa-spinner fa-spin"></i> Carregando calendário...
            </div>
        </div>
    </div>

    <script type="module" src="js/calendario.js"></script>
</body>
</html>
