<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Personagem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <script>
        // Aplica o tema salvo antes do primeiro render (evita flash)
        (function () {
            const temaId = localStorage.getItem('temaId');
            const PRESETS = {
                dark:     { '--bg-page':'#121212','--bg-card':'#1e1e1e','--bg-surface':'#252525','--text-main':'#e0e0e0','--text-sec':'#a0a0a0','--primary':'#ec7e22','--border':'#444444','--bg-button':'#333333','--text-button':'#e0e0e0', dark: true },
                ocean:    { '--bg-page':'#e0f2fe','--bg-card':'#ffffff','--bg-surface':'#f0f9ff','--text-main':'#03045e','--text-sec':'#4a90a4','--primary':'#0077b6','--border':'#bae6fd','--bg-button':'#e0f2fe','--text-button':'#03045e', dark: false },
                noite:    { '--bg-page':'#0d0d1a','--bg-card':'#16162a','--bg-surface':'#1e1e35','--text-main':'#e8e8ff','--text-sec':'#8888bb','--primary':'#7c3aed','--border':'#333355','--bg-button':'#1e1e35','--text-button':'#e8e8ff', dark: true },
                pirata:   { '--bg-page':'#1a1209','--bg-card':'#231810','--bg-surface':'#2e2015','--text-main':'#e8d5a3','--text-sec':'#a08060','--primary':'#c8973a','--border':'#4a3020','--bg-button':'#2e2015','--text-button':'#e8d5a3', dark: true },
                floresta: { '--bg-page':'#f0f7f4','--bg-card':'#ffffff','--bg-surface':'#e8f5e9','--text-main':'#1b4332','--text-sec':'#52796f','--primary':'#2d6a4f','--border':'#b7e4c7','--bg-button':'#e8f5e9','--text-button':'#1b4332', dark: false },
            };

            function aplicar(vars, isDark) {
                const root = document.documentElement;
                for (const [k, v] of Object.entries(vars)) {
                    if (k !== 'dark') root.style.setProperty(k, v);
                }
                if (isDark) document.body.classList.add('dark-mode');
            }

            if (temaId && temaId.startsWith('custom-')) {
                try {
                    const lista = JSON.parse(localStorage.getItem('temasCustomList') || '[]');
                    const tema  = lista.find(t => t.id === temaId);
                    if (tema) { aplicar(tema.vars, tema.dark); return; }
                } catch (_) {}
            }

            if (temaId && PRESETS[temaId]) {
                const p = PRESETS[temaId];
                aplicar(p, p.dark);
                return;
            }

            if (localStorage.getItem('theme') === 'dark') {
                aplicar(PRESETS.dark, true);
            }
        })();
    </script>

    <div class="char-creation-container">
        <div class="char-creation-header">
            <h1><i class="fas fa-user-plus"></i> Nova Ficha de Personagem</h1>
            <p style="color: var(--text-sec); font-size: 0.95rem;">Preencha os detalhes básicos do seu novo personagem.</p>
        </div>

        <div class="form-section">
            <h3><i class="fas fa-address-card"></i> Identidade</h3>
            <div class="form-group">
                <label>Nome do Personagem</label>
                <input type="text" id="nome" class="form-input" placeholder="João da Silva">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Nível Inicial</label>
                    <input type="number" id="nivel" class="form-input" placeholder="1" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Carga Máxima</label>
                    <input type="number" id="cargaMaxima" class="form-input" placeholder="20" value="20" min="0" step="0.1">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3><i class="fas fa-heart"></i> Barras de vitalidade</h3>
            <div class="grid-2">
                <div class="form-group">
                    <label>Pontos de Vida Máximos (HP)</label>
                    <input type="number" id="hpMax" class="form-input" placeholder="Ex: 20">
                </div>
                <div class="form-group">
                    <label>Pontos de Poder Máximos (PP)</label>
                    <input type="number" id="ppMax" class="form-input" placeholder="Ex: 10">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3><i class="fas fa-dumbbell"></i> Atributos</h3>
            <div class="grid-3" style="margin-top: 15px;">
                <div class="form-group"><label>FOR</label><input type="number" id="forca" class="form-input" placeholder="0"></div>
                <div class="form-group"><label>DES</label><input type="number" id="destreza" class="form-input" placeholder="0"></div>
                <div class="form-group"><label>CON</label><input type="number" id="constituicao" class="form-input" placeholder="0"></div>
                <div class="form-group"><label>INT</label><input type="number" id="sabedoria" class="form-input" placeholder="0"></div>
                <div class="form-group"><label>VON</label><input type="number" id="vontade" class="form-input" placeholder="0"></div>
                <div class="form-group"><label>PRE</label><input type="number" id="presenca" class="form-input" placeholder="0"></div>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <button id="btnSalvarFicha" class="btn-primary" style="max-width: 300px;"><i class="fas fa-check"></i> Criar Personagem</button>
        </div>
    </div>

    <script type="module">
        import { supabase, apiPost } from './js/utils/api.js';

        // Proteção de rota
        const { data: { session } } = await supabase.auth.getSession();
        if (!session?.user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('btnSalvarFicha').addEventListener('click', async () => {
                const nome = document.getElementById('nome').value.trim();
                const btnSalvar = document.getElementById('btnSalvarFicha');
                
                if (!nome) {
                    alert('Dê um nome ao seu personagem!');
                    document.getElementById('nome').focus();
                    return;
                }

                btnSalvar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando...';
                btnSalvar.disabled = true;

                try {
                    await apiPost('/personagens', {
                        nome,
                        nivel:        Number(document.getElementById('nivel').value) || 1,
                        hpMax:        Number(document.getElementById('hpMax').value) || 0,
                        ppMax:        Number(document.getElementById('ppMax').value) || 0,
                        cargaMaxima:  Number(document.getElementById('cargaMaxima').value) || 20,
                        forca:        Number(document.getElementById('forca').value) || 0,
                        destreza:     Number(document.getElementById('destreza').value) || 0,
                        constituicao: Number(document.getElementById('constituicao').value) || 0,
                        sabedoria:    Number(document.getElementById('sabedoria').value) || 0,
                        vontade:      Number(document.getElementById('vontade').value) || 0,
                        presenca:     Number(document.getElementById('presenca').value) || 0
                    });
                    window.location.href = 'ficha.html';
                } catch (erro) {
                    console.error('Erro ao salvar ficha:', erro);
                    alert('Erro ao salvar personagem. Tente novamente.');
                    btnSalvar.innerHTML = '<i class="fas fa-check"></i> Criar Personagem';
                    btnSalvar.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
