<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OPRPG</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Se já houver sessão Supabase válida no localStorage, redireciona ANTES de renderizar
        // o form de login (evita o "flash" da tela de login pra quem já tá logado).
        (function () {
            try {
                const PROJECT_REF = 'wtjowcjuzrlpbvpmuyuv';
                const raw = localStorage.getItem(`sb-${PROJECT_REF}-auth-token`);
                if (!raw) return;
                const data = JSON.parse(raw);
                const expiresAt = data?.expires_at;
                if (expiresAt && expiresAt * 1000 > Date.now()) {
                    window.location.replace('dashboard.html');
                }
            } catch (_) {}
        })();
    </script>
</head>

<body>
    <script>
        // Aplica o tema salvo antes do primeiro render (evita flash)
        (function () {
            const temaId = localStorage.getItem('temaId');
            const PRESETS = {
                dark:     { '--bg-page':'#121212','--bg-card':'#1e1e1e','--bg-surface':'#252525','--text-main':'#e0e0e0','--text-sec':'#a0a0a0','--primary':'#ec7e22','--border':'#444444','--bg-button':'#333333','--text-button':'#e0e0e0', dark: true },
                ocean:    { '--bg-page':'#e0f2fe','--bg-card':'#ffffff','--bg-surface':'#f0f9ff','--text-main':'#03045e','--text-sec':'#4a90a4','--primary':'#0077b6','--border':'#bae6fd','--bg-button':'#e0f2fe','--text-button':'#03045e', dark: false },
                noite:    { '--bg-page':'#0d0d1a','--bg-card':'#16162a','--bg-surface':'#1e1e35','--text-main':'#e8e8ff','--text-sec':'#8888bb','--primary':'#7c3aed','--border':'#333355','--bg-button':'#1e1e35','--text-button':'#e8e8ff', dark: true },
                pirata:   { '--bg-page':'#1a1209','--bg-card':'#231810','--bg-surface':'#2e2015','--text-main':'#e8d5a3','--text-sec':'#a08060','--primary':'#c8973a','--border':'#4a3020','--bg-button':'#2e2015','--text-button':'#e8d5a3', dark: true },
                floresta: { '--bg-page':'#f0f7f4','--bg-card':'#ffffff','--bg-surface':'#e8f5e9','--text-main':'#1b4332','--text-sec':'#52796f','--primary':'#2d6a4f','--border':'#b7e4c7','--bg-button':'#e8f5e9','--text-button':'#1b4332', dark: false },
            };

            function aplicar(vars, isDark) {
                const root = document.documentElement;
                for (const [k, v] of Object.entries(vars)) {
                    if (k !== 'dark') root.style.setProperty(k, v);
                }
                if (isDark) document.body.classList.add('dark-mode');
            }

            if (temaId && temaId.startsWith('custom-')) {
                try {
                    const lista = JSON.parse(localStorage.getItem('temasCustomList') || '[]');
                    const tema  = lista.find(t => t.id === temaId);
                    if (tema) { aplicar(tema.vars, tema.dark); return; }
                } catch (_) {}
            }

            if (temaId && PRESETS[temaId]) {
                const p = PRESETS[temaId];
                aplicar(p, p.dark);
                return;
            }

            if (localStorage.getItem('theme') === 'dark') {
                aplicar(PRESETS.dark, true);
            }
        })();
    </script>
    
    <div id="authToast" class="auth-toast">
        <span id="toastMessage"></span>
        <button type="button" id="closeToast" class="close-toast"><i class="fas fa-times"></i></button>
    </div>

    <div class="auth-wrapper">
        <form class="auth-card" id="authForm" onsubmit="event.preventDefault();">
            <div style="text-align: center; margin-bottom: 20px;">
                <h1 style="color: var(--primary); margin-bottom: 5px;"><i class="fa-solid fa-dice-d20"></i> Hand Rolls</h1>
                <p style="color: var(--text-sec); font-size: 0.9rem;">Acesse sua conta para continuar</p>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="username" class="form-input" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" autocomplete="current-password" class="form-input" placeholder="******">
            </div>

            <div id="campoConfirmarSenha" class="form-group" style="display: none;">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" autocomplete="new-password" class="form-input" placeholder="Repita a senha">
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
                <button type="submit" id="btnLogin" class="btn-primary">Entrar</button>
                <button type="button" id="btnCriarConta" class="btn-primary" style="display:none;">Criar Conta</button>
            </div>

            <div style="text-align: center; margin-top: 15px;">
                <button type="button" id="toggleModo" class="btn-text">Não tem conta? Cadastre-se</button>
            </div>
        </form>
    </div>

    <script type="module" src="js/auth.js"></script>

    <script>
        const toggleBtn = document.getElementById('toggleModo');
        const btnLogin = document.getElementById('btnLogin');
        const btnCriar = document.getElementById('btnCriarConta');
        const campoConfirmar = document.getElementById('campoConfirmarSenha');
        let modoCadastro = false;

        toggleBtn.addEventListener('click', () => {
            modoCadastro = !modoCadastro;
            btnLogin.style.display     = modoCadastro ? 'none'  : 'block';
            btnCriar.style.display     = modoCadastro ? 'block' : 'none';
            campoConfirmar.style.display = modoCadastro ? 'block' : 'none';
            toggleBtn.textContent = modoCadastro
                ? 'Já tem conta? Faça login'
                : 'Não tem conta? Cadastre-se';
            
            const toast = document.getElementById('authToast');
            if (toast) toast.classList.remove('show');
            
            // Atualiza os textos contextuais
            const title = document.querySelector('.auth-card h1');
            const subtitle = document.querySelector('.auth-card p');
            if(modoCadastro) {
                title.innerHTML = '<i class="fas fa-user-plus"></i> Cadastro';
                subtitle.innerText = 'Crie sua conta para jogar';
            } else {
                title.innerHTML = '<i class="fa-solid fa-dice-d20"></i> Hand Rolls';
                subtitle.innerText = 'Acesse sua conta para continuar';
            }
        });
    </script>

</body>
</html>
