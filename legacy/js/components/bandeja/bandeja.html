<div id="bandeja" class="bandeja">

    <div id="bandejaHeader" class="bandeja-header">
        <div class="header-left">
            <i id="bandejaIconLeft" class="fas fa-dice-d20"></i>
            <span id="bandejaTitulo" class="bandeja-titulo">Rolador</span>
        </div>
        <i id="bandejaIcon" class="fas fa-chevron-up"></i>
    </div>

    <div class="bandeja-body">

        <!-- Switch de painéis -->
        <div class="bandeja-switch">
            <button class="switch-btn active" data-tab="rolador">
                <i class="fas fa-dice-d20"></i> Rolador
            </button>
            <button class="switch-btn" data-tab="chat">
                <i class="fas fa-comment"></i> Chat
            </button>
        </div>

        <!-- PAINEL: ROLADOR -->
        <div id="painelRolador" class="painel-bandeja active">
            <div id="diceContainer" class="dice-grid-buttons">
                <button id="btnToggleSign" class="dice-btn sign-btn" title="Alternar Somar/Subtrair">+</button>
                <button class="dice-btn" data-faces="4">d4</button>
                <button class="dice-btn" data-faces="6">d6</button>
                <button class="dice-btn" data-faces="8">d8</button>
                <button class="dice-btn" data-faces="10">d10</button>
                <button class="dice-btn" data-faces="12">d12</button>
                <button class="dice-btn" data-faces="20">d20</button>
                <button class="dice-btn" data-faces="100">d100</button>
            </div>

            <div class="tray-footer">
                <div style="flex: 1;">
                    <label style="font-size: 0.7rem; color: #666;">Modificador</label>
                    <input type="number" id="inputModificador" value="0" placeholder="+0">
                </div>
                <button id="btnLimparTray" class="clear-btn" title="Limpar"><i class="fas fa-trash"></i></button>
            </div>

            <button id="btnRolarTray" class="roll-btn">ROLAR!</button>

            <div id="trayResult" class="tray-result-box">
                <div style="font-size: 0.8rem; color: #aaa;">Resultado:</div>
                <div id="txtTotal" style="font-size: 2rem; font-weight: 800; color: var(--primary);">--</div>
                <div id="txtDetalhes" style="font-size: 0.85rem; color: #555; margin-top: 5px;">Selecione dados...</div>
            </div>

            <!-- BANNER: MODO GRAVAÇÃO -->
            <div id="presetRecBanner" class="preset-rec-banner" style="display:none;">
                <span><i class="fas fa-circle preset-rec-dot"></i> Gravando preset...</span>
                <button id="btnCancelRec" class="preset-rec-cancel" title="Cancelar gravação">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- TOGGLE PRESETS (botão que revela/esconde) -->
            <button id="btnTogglePresets" class="preset-toggle-btn">
                <i class="fas fa-bookmark"></i>
                <span>Presets</span>
                <i id="presetToggleIcon" class="fas fa-chevron-down preset-toggle-chevron"></i>
            </button>

            <!-- ÁREA DE PRESETS (escondida por padrão) -->
            <div id="presetsWrapper" class="presets-wrapper collapsed">
                <div id="presetsArea" class="presets-area">
                    <div id="presetsEmpty" class="presets-empty">
                        <i class="fas fa-bookmark" style="font-size:1.5rem; opacity:0.4;"></i>
                        <p>Nenhum preset criado</p>
                        <button id="btnCriarPresetEmpty" class="preset-add-btn">
                            <i class="fas fa-plus"></i> Criar Preset
                        </button>
                    </div>
                    <div id="presetsGrid" class="presets-grid" style="display:none;"></div>
                    <button id="btnCriarPreset" class="preset-add-btn" style="display:none;">
                        <i class="fas fa-plus"></i> Novo Preset
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL: NOME DO PRESET -->
        <div id="modalPresetNome" class="preset-name-overlay" style="display:none;">
            <div class="preset-name-modal">
                <h4><i class="fas fa-bookmark"></i> Nome do Preset</h4>
                <input type="text" id="inputPresetNome" placeholder="Ex: Ataque com machado" maxlength="40" autocomplete="off" />
                <div class="preset-name-actions">
                    <button id="btnPresetNomeCancel" class="preset-name-btn cancel">Cancelar</button>
                    <button id="btnPresetNomeOk" class="preset-name-btn ok">Salvar</button>
                </div>
            </div>
        </div>

        <!-- PAINEL: CHAT -->
        <div id="painelChat" class="painel-bandeja">
            <div id="chatMessages" class="chat-messages">
                <p style="color: #999; text-align: center; font-size: 0.9rem;">Nenhuma mensagem ainda...</p>
            </div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Digite uma mensagem..." />
                <button id="sendChatBtn" title="Enviar">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

    </div>
</div>
