<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa do Narrador</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./js/components/bandeja/bandeja.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Aplica o tema salvo antes do primeiro render (evita flash)
        (function () {
            const temaId = localStorage.getItem('temaId');
            const PRESETS = {
                dark:     { '--bg-page':'#121212','--bg-card':'#1e1e1e','--bg-surface':'#252525','--text-main':'#e0e0e0','--text-sec':'#a0a0a0','--primary':'#ec7e22','--border':'#444444','--bg-button':'#333333','--text-button':'#e0e0e0', dark: true },
                ocean:    { '--bg-page':'#e0f2fe','--bg-card':'#ffffff','--bg-surface':'#f0f9ff','--text-main':'#03045e','--text-sec':'#4a90a4','--primary':'#0077b6','--border':'#bae6fd','--bg-button':'#e0f2fe','--text-button':'#03045e', dark: false },
                noite:    { '--bg-page':'#0d0d1a','--bg-card':'#16162a','--bg-surface':'#1e1e35','--text-main':'#e8e8ff','--text-sec':'#8888bb','--primary':'#7c3aed','--border':'#333355','--bg-button':'#1e1e35','--text-button':'#e8e8ff', dark: true },
                pirata:   { '--bg-page':'#1a1209','--bg-card':'#231810','--bg-surface':'#2e2015','--text-main':'#e8d5a3','--text-sec':'#a08060','--primary':'#c8973a','--border':'#4a3020','--bg-button':'#2e2015','--text-button':'#e8d5a3', dark: true },
                floresta: { '--bg-page':'#f0f7f4','--bg-card':'#ffffff','--bg-surface':'#e8f5e9','--text-main':'#1b4332','--text-sec':'#52796f','--primary':'#2d6a4f','--border':'#b7e4c7','--bg-button':'#e8f5e9','--text-button':'#1b4332', dark: false },
            };
            function aplicar(vars, isDark) {
                const root = document.documentElement;
                for (const [k, v] of Object.entries(vars)) {
                    if (k !== 'dark') root.style.setProperty(k, v);
                }
                if (isDark) document.body.classList.add('dark-mode');
            }
            if (temaId && temaId.startsWith('custom-')) {
                try {
                    const lista = JSON.parse(localStorage.getItem('temasCustomList') || '[]');
                    const tema  = lista.find(t => t.id === temaId);
                    if (tema) { aplicar(tema.vars, tema.dark); return; }
                } catch (_) {}
            }
            if (temaId && PRESETS[temaId]) {
                const p = PRESETS[temaId];
                aplicar(p, p.dark);
                return;
            }
            if (localStorage.getItem('theme') === 'dark') {
                aplicar(PRESETS.dark, true);
            }
        })();
    </script>

    <style>
        .narrador-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .painel-central {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .btn-voltar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .btn-voltar:hover { background: var(--primary); }

        .mesa-header {
            position: relative;
            height: 250px;
            background: #111;
            display: flex;
            align-items: flex-end;
            padding: 30px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .mesa-header img.mesa-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            z-index: 1;
            filter: grayscale(0.5);
        }

        .mesa-info {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .mesa-info h1 {
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,1);
            color: #fff;
        }

        .codigo-badge {
            background: rgba(236, 126, 34, 0.2);
            color: var(--primary);
            font-size: 1.2rem;
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid var(--primary);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .codigo-badge:hover {
            background: var(--primary);
            color: #fff;
        }

        .grid-personagens {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        /* Card de Personagem */
        .char-card-narrador {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .char-card-narrador::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        .char-card-narrador:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .char-header {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .char-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .char-title h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .char-title span {
            font-size: 0.85rem;
            color: #888;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .bar-group-mini {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 5px;
        }

        .bar-label-mini {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #ccc;
        }

        .progress-track-mini {
            width: 100%;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill-mini {
            height: 100%;
            transition: width 0.3s ease;
        }

        .fill-hp { background: #d32f2f; }
        .fill-pp { background: #1976d2; }

        /* Oculta layout lateral duro para usar a bandeja puramente original */
    </style>
</head>
<body>
    <div class="narrador-container" style="display: block; overflow-y: auto;">
        
        <div class="painel-central" style="height: auto; min-height: 100vh;">
            <div style="position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 10;">
                <a href="dashboard.html" class="btn-voltar" style="position: relative; top: 0; left: 0;"><i class="fas fa-arrow-left"></i> Voltar</a>
                <div class="btn-voltar" id="btnPaleta" title="Trocar Tema" style="cursor: pointer; position: relative; top: 0; left: 0;">
                    <i class="fas fa-palette"></i> Tema
                </div>
            </div>
            
            <div class="mesa-header">
                <img id="mesaBanner" class="mesa-banner" src="" alt="Banner">
                <div class="mesa-info">
                    <div>
                        <h1 id="mesaNome">Carregando...</h1>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <a id="btnAbrirCalendario" class="codigo-badge" href="#" style="border-color: var(--primary); background: rgba(236, 126, 34, 0.2); text-decoration: none;">
                            <i class="fas fa-calendar-days"></i> Calendário
                        </a>
                        <div class="codigo-badge" id="mesaCodigo" title="Clique para copiar">
                            <i class="fas fa-key"></i> <span id="txtCodigo">......</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid-personagens" id="gridPersonagens">
                <!-- Personagens da mesa -->
            </div>
        </div>

        <div id="bandejaContainer"></div>

    </div>

    <!-- Script da página -->
    <script type="module" src="js/narrador.js"></script>
</body>
</html>
